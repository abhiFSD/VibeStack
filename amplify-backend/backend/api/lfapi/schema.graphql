type Mutation {
  createStripeCustomer(organization: ID!): StripeCustomerResponse @function(name: "createStripeCustomer-${env}")
  updateSubscription(
    organizationId: ID!, 
    billingPeriod: String!
  ): SubscriptionUpdateResponse @function(name: "handleSubscribe-${env}")
  updateSubscriptionQuantity(
    organizationId: ID!,
    newQuantity: Int!
  ): SubscriptionUpdateResponse @function(name: "handleSubscribe-${env}")
  purchaseLicenses(
    organizationId: ID!,
    quantity: Int!,
    billingPeriod: String!
  ): LicensePurchaseResponse @function(name: "handleSubscribe-${env}")
  sendEmail(input: SendEmailInput!): EmailResponse @function(name: "notificationEmail-${env}")
  syncPaymentStatus(organizationId: ID!): PaymentSyncResponse @function(name: "handleSubscribe-${env}")
}

type StripeCustomerResponse {
  success: Boolean!
  customerId: String
  error: String
}

type SubscriptionUpdateResponse {
  success: Boolean!
  subscriptionId: String
  clientSecret: String
  proratedAmount: Float
  additionalLicenses: Int
  error: String
}

input SendEmailInput {
  to: String!
  subject: String!
  html: String!
  organizationID: ID!
}

type EmailResponse {
  success: Boolean!
  message: String
}

type PaymentSyncResponse {
  success: Boolean!
  organizationId: String
  message: String
  error: String
}
type LicensePurchaseResponse {
  success: Boolean!
  clientSecret: String
  licensesPurchased: Int
  totalAmount: Float
  paymentProcessed: Boolean
  error: String
}

