  duration: Int  # seconds
  sectionsViewed: [String]  # Array of section IDs viewed in this session
  createdAt: AWSDateTime!
  updatedAt: AWSDateTime!
  _version: Int
  _deleted: Boolean
  _lastChangedAt: AWSTimestamp
}

# Track overall learning progress per user
type LearningProgress @model 
  @auth(rules: [{allow: owner}, {allow: groups, groups: ["admin"]}]) {
  id: ID!
  userSub: String! @index(name: "byUser")
  organizationID: ID! @index(name: "byOrganization")
  learningID: ID! @index(name: "byLearning")
  learning: Learning @belongsTo(fields: ["learningID"])
  
  # Progress tracking
  chaptersCompleted: [String]  # Array of completed chapter IDs
  sectionsViewed: [String]     # Array of all viewed section IDs
  totalTimeSpent: Int          # Total seconds spent
  lastAccessedAt: AWSDateTime
  completionPercentage: Float
  
  # Additional metadata
  firstAccessedAt: AWSDateTime
  totalSessions: Int
  averageSessionDuration: Int
  
  # Reading position tracking (NEW - optional fields)
  lastViewedSection: String    # ID of the last section user was reading
  lastScrollPosition: Int      # Scroll position in pixels where user left off
  readingSessionData: AWSJSON  # JSON object with detailed reading session info
  
  createdAt: AWSDateTime!
  updatedAt: AWSDateTime!
  _version: Int
  _deleted: Boolean
  _lastChangedAt: AWSTimestamp
}

# Track detailed section interactions
type SectionInteraction @model 
  @auth(rules: [{allow: owner}, {allow: groups, groups: ["admin"]}]) {
  id: ID!
  userSub: String! @index(name: "byUser")
  organizationID: ID! @index(name: "byOrganization")
  learningID: ID! @index(name: "byLearning")
  chapterID: String!
  sectionID: String! @index(name: "bySection")
  
  # Interaction metrics
  timeSpent: Int        # Total seconds on this section
  viewCount: Int        # Number of times viewed
  lastViewedAt: AWSDateTime!
  firstViewedAt: AWSDateTime!
  completed: Boolean    # Mark as completed when user spends enough time
  
  createdAt: AWSDateTime!
  updatedAt: AWSDateTime!
  _version: Int
  _deleted: Boolean
  _lastChangedAt: AWSTimestamp
}